{% include fetch_google_scholar_stats.html %}

<script>
(function () {
  // Venue-colored code tag coloring
  var venueMap = [
    ['iclr',        'venue-iclr'],
    ['acl',         'venue-acl'],
    ['aaai',        'venue-aaai'],
    ['emnlp',       'venue-emnlp'],
    ['neurips',     'venue-neurips'],
    ['nips',        'venue-neurips'],
    ['icml',        'venue-icml'],
    ['icassp',      'venue-icassp'],
    ['cvpr',        'venue-cvpr'],
    ['iccv',        'venue-iccv'],
    ['arxiv',       'venue-arxiv'],
  ];
  document.querySelectorAll('p > code, li > code').forEach(function (el) {
    var t = el.textContent.toLowerCase();
    for (var i = 0; i < venueMap.length; i++) {
      if (t.indexOf(venueMap[i][0]) !== -1) {
        el.classList.add(venueMap[i][1]);
        break;
      }
    }
  });

  // Staggered scroll fade-in for paper boxes
  if ('IntersectionObserver' in window) {
    var s = document.createElement('style');
    s.textContent = '.paper-box{opacity:0;transition:opacity 0.55s ease,box-shadow 0.25s ease}.paper-box.pb-visible{opacity:1}';
    document.head.appendChild(s);
    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add('pb-visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.paper-box').forEach(function (el, i) {
      el.style.transitionDelay = (i * 0.07) + 's';
      obs.observe(el);
    });
  }
})();
</script>
